<template>
    <template if:true={isLoading}>
        <div class="ec-loading">
            <div class="ec-spinner"></div>
            <p class="ec-loading-text">Loading models…</p>
        </div>
    </template>

    <template if:true={hasError}>
        <div class="ec-error">
            <p>Unable to load vehicle models. Please refresh the page.</p>
        </div>
    </template>

    <template if:true={isReady}>
        <div class="ec">

            <nav class="ec-nav">
                <div class="ec-brand">
                    <div class="ec-bolt">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9z"/>
                        </svg>
                    </div>
                    <span class="ec-brand-name">Electra</span>
                </div>
                <div class="ec-nav-links">
                    <a href="#models">Models</a>
                    <a href="#technology">Technology</a>
                    <a href="#showrooms">Showrooms</a>
                    <a href="#owners">Owners</a>
                </div>
            </nav>

            <div class="ec-hero-strip">
                <div class="ec-hero-eyebrow">2025 Lineup &mdash; India</div>
                <div class="ec-hero-heading">
                    Drive the<br/><em>extraordinary</em>
                </div>
                <div class="ec-hero-sub">Select a model to explore full specifications</div>
            </div>
            <div class="ec-gold-rule"></div>

            <div class="ec-grid-label" id="models">Our models &mdash; click to explore</div>

            <div class="ec-grid">
                <template for:each={vehicles} for:item="car">
                    <div
                        key={car.developerName}
                        class={car.cardClass}
                        onclick={handleCardClick}
                        data-devname={car.developerName}
                        role="button"
                        tabindex="0"
                        aria-pressed={car.isSelected}
                    >
                        <div class="ec-card-inner">
                            <div class="ec-card-badge">{car.badge}</div>

<img src="https://images.unsplash.com/photo-1617788138017-80ad40651399?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=800&amp;q=80" alt="Sedan" style="width: 100%; height: 100%; object-fit: contain;" />                            <div class="ec-card-name">{car.label}</div>
                            <div class="ec-card-tagline">{car.tagline}</div>
                            <div class="ec-card-price">{car.startingPrice}</div>
                            <div class="ec-card-hint">&#8595; View specifications</div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="ec-divider-gold"></div>

            <template if:true={selectedCar}>
                <div class="ec-detail">
                    <div class="ec-detail-header">
                        <div class="ec-detail-title-block">
                            <div class="ec-detail-eyebrow">{selectedCar.badge}</div>
                            <div class="ec-detail-title">Electra {selectedCar.label}</div>
                            <div class="ec-detail-subtitle">{selectedCar.batterySpec}</div>
                        </div>
                        <div class="ec-detail-price-block">
                            <div class="ec-detail-price-label">Starting price</div>
                            <div class="ec-detail-price-val">{selectedCar.startingPrice}</div>
                        </div>
                    </div>

                    <div class="ec-specs-grid">
                        <div class="ec-spec">
                            <div class="ec-spec-val">
                                {selectedCar.rangeKm}<span class="ec-spec-unit">km</span>
                            </div>
                            <div class="ec-spec-label">WLTP Range</div>
                        </div>
                        <div class="ec-spec">
                            <div class="ec-spec-val">
                                {selectedCar.zeroToHundred}<span class="ec-spec-unit">sec</span>
                            </div>
                            <div class="ec-spec-label">0&ndash;100 km/h</div>
                        </div>
                        <div class="ec-spec">
                            <div class="ec-spec-val">
                                {selectedCar.peakPowerBhp}<span class="ec-spec-unit">bhp</span>
                            </div>
                            <div class="ec-spec-label">Peak Power</div>
                        </div>
                        <div class="ec-spec">
                            <div class="ec-spec-val">
                                {selectedCar.fastChargeMin}<span class="ec-spec-unit">min</span>
                            </div>
                            <div class="ec-spec-label">DC Fast Charge</div>
                        </div>
                    </div>

                    <div class="ec-desc-strip">
                        <p class="ec-desc-text">{selectedCar.description}</p>
                    </div>

                    <div class="ec-features-row">
                        <div class="ec-feat-card">
                            <div class="ec-feat-icon">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                                </svg>
                            </div>
                            <div class="ec-feat-title">{selectedCar.feature1Title}</div>
                            <div class="ec-feat-desc">{selectedCar.feature1Desc}</div>
                        </div>
                        <div class="ec-feat-card">
                            <div class="ec-feat-icon">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
                                </svg>
                            </div>
                            <div class="ec-feat-title">{selectedCar.feature2Title}</div>
                            <div class="ec-feat-desc">{selectedCar.feature2Desc}</div>
                        </div>
                        <div class="ec-feat-card">
                            <div class="ec-feat-icon">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                                </svg>
                            </div>
                            <div class="ec-feat-title">{selectedCar.feature3Title}</div>
                            <div class="ec-feat-desc">{selectedCar.feature3Desc}</div>
                        </div>
                    </div>

                    <div class="ec-cta-row">
                        <button class="ec-btn-primary" onclick={handleBookTestDrive}>
                            Book test drive &rarr;
                        </button>
                        <button class="ec-btn-ghost" onclick={handleFinanceOptions}>
                            Finance options &rarr;
                        </button>
                    </div>
                </div>
            </template>

            <footer class="ec-footer">
                <div class="ec-support-bar">
                    <div class="ec-support-left">
                        <div class="ec-support-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17
0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="ec-support-label">Customer support</div>
                            <div class="ec-support-num">1800 102 8800</div>
                            <div class="ec-support-hours">Mon &ndash; Sat &middot; 8 AM to 8 PM IST</div>
                        </div>
                    </div>
                    <div class="ec-support-right">
                        <button class="ec-support-btn ec-support-btn--call" onclick={handleCallSupport}>
                            Call now
                        </button>
                        <button class="ec-support-btn ec-support-btn--chat" onclick={handleLiveChat}>
                            Live chat &rarr;
                        </button>
                    </div>
                </div>

                <div class="ec-footer-grid">
                    <div>
                        <div class="ec-footer-brand-name">Electra Cars India</div>
                        <p class="ec-footer-brand-desc">
                            Pioneering the electric revolution on Indian roads since 2019.
                            Engineered for performance, designed for longevity, built for tomorrow.
                        </p>
                    </div>
                    <div>
                        <div class="ec-footer-col-title">Company</div>
                        <a class="ec-footer-link" href="#about">About us</a>
                        <a class="ec-footer-link" href="#careers">Careers</a>
                        <a class="ec-footer-link" href="#press">Press room</a>
                        <a class="ec-footer-link" href="#investors">Investors</a>
                    </div>
                    <div>
                        <div class="ec-footer-col-title">Owners</div>
                        <a class="ec-footer-link" href="#service">Service centres</a>
                        <a class="ec-footer-link" href="#warranty">Warranty</a>
                        <a class="ec-footer-link" href="#charging">Charging network</a>
                        <a class="ec-footer-link" href="#accessories">Accessories</a>
                    </div>
                </div>

                <div class="ec-footer-bottom">
                    <div class="ec-footer-copy">
                        &copy; 2025 Electra Cars India Pvt. Ltd. All rights reserved.
                    </div>
                    <div class="ec-footer-cert">
                        <span class="ec-cert-badge">AIS 038 Certified</span>
                        <span class="ec-cert-badge">FAME II</span>
                        <span class="ec-cert-badge">ISO 26262</span>
                    </div>
                </div>
            </footer>

        </div>
    </template>
</template>
